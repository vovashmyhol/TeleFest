<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tele Fest</title>
  <!-- Google Fonts for modern typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <!-- Background ambient glow layers -->
  <div class="ambient-glow glow-1"></div>
  <div class="ambient-glow glow-2"></div>
  
  <div class="app-container">
    <!-- Header Area -->
    <header class="app-header">
      <div class="brand">
        <img src="TeleFest.webp" alt="Tele Fest" class="brand-logo">
      </div>
      
      <!-- Gems Counter Block with iOS squircle shape -->
      <div class="gems-block" id="gemsBlock">
        <!-- Clipped inner container for background and shimmer -->
        <div class="gems-block-inner">
          <svg class="gems-block-bg-svg" viewBox="0 0 96 38" preserveAspectRatio="none">
            <!-- Background of the squircle -->
            <path class="gems-bg" d="M 19,0 L 77,0 C 88,0 96,8.5 96,19 C 96,29.5 88,38 77,38 L 19,38 C 8,38 0,29.5 0,19 C 0,8.5 8,0 19,0 Z" />
          </svg>
          <!-- Shimmer sweep effect -->
          <div class="shimmer-overlay"></div>
        </div>

        <!-- Border SVG overlay (outside the clipped div to keep drop-shadow glow visible) -->
        <svg class="gems-block-border-svg" viewBox="0 0 96 38" preserveAspectRatio="none">
          <defs>
            <linearGradient id="gemsBorderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffd23f" stop-opacity="0.95" />
              <stop offset="35%" stop-color="#ffd23f" stop-opacity="0.45" />
              <stop offset="70%" stop-color="#ffd23f" stop-opacity="0.1" />
              <stop offset="100%" stop-color="#ffd23f" stop-opacity="0.01" />
            </linearGradient>
          </defs>
          <!-- Border of the squircle (slightly inset to prevent clipping) -->
          <path class="gems-border" d="M 19,0.5 L 77,0.5 C 87.5,0.5 95.5,8.8 95.5,19 C 95.5,29.2 87.5,37.5 77,37.5 L 19,37.5 C 8.5,37.5 0.5,29.2 0.5,19 C 0.5,8.8 8.5,0.5 19,0.5 Z" />
        </svg>
        
        <div class="gems-content">
          <img src="gems.webp" alt="Gems" class="gems-icon">
          <span class="gems-amount" id="gemsCount">1,250</span>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="app-main">
      <div id="tab-home" class="tab-page active">
        <!-- View Container to switch between Photo Banner and Cases Grid -->
        <div class="home-view-container">
          
          <!-- View 1: Main Photo Card (visible by default) -->
          <div class="photo-view" id="photoView">
            <!-- Widescreen Banner Container -->
            <div class="photo-card-wrapper">
              <div class="photo-card-rect" id="photoCard">
                <!-- Demo image using forzaBnner -->
                <img src="forzaBnner" alt="Featured Photo" class="photo-img">
                
                <!-- Subtle grey iOS-style border overlay -->
                <div class="photo-card-border-overlay"></div>
                <div class="photo-card-shimmer"></div>
              </div>
            </div>
            <p class="photo-hint">Нажмите на фото, чтобы открыть кейсы</p>
          </div>
          
          <!-- View 2: Cases Grid (hidden by default) -->
          <div class="cases-view" id="casesView">
            <div class="cases-header">
              <button class="back-btn" id="backToPhotoBtn">
                <svg class="back-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <polyline points="15 18 9 12 15 6"/>
                </svg>
                <span>Назад</span>
              </button>
              <h1 class="tab-title" style="margin-left: 12px; font-size: 20px; margin-bottom: 0;">Выбор кейса</h1>
            </div>
            
            <!-- Cases Grid (3x2) -->
            <div class="cases-grid">
              <!-- Case 1 (Purple Gradient) -->
              <div class="case-card case-card-1">
                <div class="case-photo-container">
                  <!-- Для вставки фото кейса замените SVG ниже на: <img src="путь_к_фото" class="case-img"> -->
                  <svg class="case-placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 8v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8m18 0l-9-5-9 5m18 0l-9 5-9-5m9 5v8" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
                <div class="case-price-badge">
                  <img src="stars-DBKMczxe.png" alt="Stars" class="star-icon">
                  <span class="price-val">50</span>
                </div>
              </div>

              <!-- Case 2 (Blue Gradient) -->
              <div class="case-card case-card-2">
                <div class="case-photo-container">
                  <svg class="case-placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 8v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8m18 0l-9-5-9 5m18 0l-9 5-9-5m9 5v8" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
                <div class="case-price-badge">
                  <img src="stars-DBKMczxe.png" alt="Stars" class="star-icon">
                  <span class="price-val">100</span>
                </div>
              </div>

              <!-- Case 3 (Teal Gradient) -->
              <div class="case-card case-card-3">
                <div class="case-photo-container">
                  <svg class="case-placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 8v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8m18 0l-9-5-9 5m18 0l-9 5-9-5m9 5v8" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
                <div class="case-price-badge">
                  <img src="stars-DBKMczxe.png" alt="Stars" class="star-icon">
                  <span class="price-val">150</span>
                </div>
              </div>

              <!-- Case 4 (Amber Gradient) -->
              <div class="case-card case-card-4">
                <div class="case-photo-container">
                  <svg class="case-placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 8v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8m18 0l-9-5-9 5m18 0l-9 5-9-5m9 5v8" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
                <div class="case-price-badge">
                  <img src="stars-DBKMczxe.png" alt="Stars" class="star-icon">
                  <span class="price-val">200</span>
                </div>
              </div>

              <!-- Case 5 (Ruby Gradient) -->
              <div class="case-card case-card-5">
                <div class="case-photo-container">
                  <svg class="case-placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 8v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8m18 0l-9-5-9 5m18 0l-9 5-9-5m9 5v8" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
                <div class="case-price-badge">
                  <img src="stars-DBKMczxe.png" alt="Stars" class="star-icon">
                  <span class="price-val">250</span>
                </div>
              </div>

              <!-- Case 6 (Grey Gradient) -->
              <div class="case-card case-card-6">
                <div class="case-photo-container">
                  <svg class="case-placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 8v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8m18 0l-9-5-9 5m18 0l-9 5-9-5m9 5v8" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
                <div class="case-price-badge">
                  <img src="stars-DBKMczxe.png" alt="Stars" class="star-icon">
                  <span class="price-val">300</span>
                </div>
              </div>
            </div>
          </div>
          
        </div>
      </div>
      <div id="tab-quests" class="tab-page">
        <!-- Quests page content (currently empty) -->
      </div>
      <div id="tab-friends" class="tab-page">
        <!-- Friends page content (currently empty) -->
      </div>
    </main>
    
    <!-- Footer Navigation -->
    <footer class="app-nav">
      <div class="nav-item active" data-tab="home">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Главная</span>
      </div>
      <div class="nav-item" data-tab="quests">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
        <span>Квесты</span>
      </div>
      <div class="nav-item" data-tab="friends">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Друзья</span>
      </div>
    </footer>
  </div>

  <!-- Bottom Sheet Confirmation for Case Opening -->
  <div class="bottom-sheet-backdrop" id="confirmBackdrop"></div>
  <div class="bottom-sheet" id="confirmBottomSheet">
    <div class="sheet-pull-bar"></div>
    <div class="sheet-content">
      <div class="sheet-case-photo" id="sheetCasePhoto">
        <!-- Dynamically set inside JS -->
      </div>
      <h3 class="sheet-title">Открыть кейс?</h3>
      <p class="sheet-description">С вашего баланса будет списано <span id="sheetCasePrice">0</span> звёзд</p>
      
      <div class="sheet-actions">
        <button class="sheet-btn confirm-btn" id="confirmOpenBtn">Открыть</button>
        <button class="sheet-btn cancel-btn" id="confirmCancelBtn">Отмена</button>
      </div>
    </div>
  </div>

  <!-- Fullscreen Vertical Roulette Spinner Overlay -->
  <div class="fullscreen-overlay" id="rouletteOverlay">


    <!-- Full-width reel viewport — edge to edge -->
    <div class="roulette-viewport" id="rouletteViewport">
      <div class="roulette-reel" id="rouletteReel"></div>
      <!-- Gold frame at center -->
      <div class="roulette-selection-frame"></div>
      <!-- Top/bottom fades -->
      <div class="roulette-fade roulette-fade--top"></div>
      <div class="roulette-fade roulette-fade--bottom"></div>
    </div>

    <!-- Arrows absolutely centred over the viewport -->
    <div class="roulette-arrow arrow-left">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="9 6 15 12 9 18"/>
      </svg>
    </div>
    <div class="roulette-arrow arrow-right">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="15 6 9 12 15 18"/>
      </svg>
    </div>

    <button class="skip-btn" id="skipAnimBtn">Пропустить анимацию</button>
  </div>

  <!-- Fullscreen Win Screen Overlay -->
  <div class="fullscreen-overlay" id="winOverlay">
    <!-- Fireworks element particles -->
    <div class="fireworks-container" id="fireworksContainer"></div>
    
    <div class="win-content">
      <div class="win-sparkle-glow"></div>
      <div class="win-photo-wrapper" id="winPhotoWrapper">
        <img src="gems.webp" alt="Prize" class="win-prize-img" id="winPrizeImg">
      </div>
      <h2 class="win-title">Вы выиграли!</h2>
      <h3 class="win-prize-name" id="winPrizeName">Супер-Кейс</h3>
      <p class="win-description" id="winPrizeDesc">Награда успешно добавлена на ваш баланс</p>
      
      <button class="collect-btn" id="collectBtn">Забрать</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
